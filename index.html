<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單資料查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f3f4f6;
        }
        .loader {
            border-top-color: #3498db;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- 標題區 -->
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-gray-800">訂單系統查詢介面</h1>
            <p class="text-gray-600 mt-2">請輸入會員姓名以獲取最新訂單資訊</p>
        </div>

        <!-- 查詢表單 -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow">
                    <label for="userName" class="block text-sm font-medium text-gray-700 mb-1">使用者名稱</label>
                    <input type="text" id="userName" placeholder="例如：黃文雄" 
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
                <div class="flex items-end">
                    <button id="searchBtn" class="w-full md:w-auto px-8 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors shadow-sm flex items-center justify-center">
                        <span id="btnText">送出查詢</span>
                        <!-- 載入中動畫 -->
                        <div id="loadingIcon" class="hidden loader w-5 h-5 border-2 border-white border-t-transparent rounded-full ml-2"></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- 訊息提示區 -->
        <div id="messageBox" class="hidden mb-6 p-4 rounded-lg"></div>

        <!-- 查詢結果表格 -->
        <div id="resultContainer" class="hidden bg-white rounded-xl shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">訂單編號</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">會員姓名</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">購買商品</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">購買金額</th>
                            <th class="px-6 py-4 text-sm font-bold text-gray-700">交易時間</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody" class="divide-y divide-gray-100">
                        <!-- 資料將由 JS 插入 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const userNameInput = document.getElementById('userName');
        const loadingIcon = document.getElementById('loadingIcon');
        const btnText = document.getElementById('btnText');
        const messageBox = document.getElementById('messageBox');
        const resultContainer = document.getElementById('resultContainer');
        const resultBody = document.getElementById('resultBody');

        const WEBHOOK_URL = 'https://ejagf9pp.roamerhost.com/webhook-test/ec33a6e9-5571-47e3-a674-a1c6b65fa661';

        async function performSearch() {
            const name = userNameInput.value.trim();
            
            if (!name) {
                showMessage('請輸入姓名後再進行查詢', 'error');
                return;
            }

            // UI 狀態切換：載入中
            setLoading(true);
            hideResult();
            hideMessage();

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: name })
                });

                if (!response.ok) {
                    throw new Error(`伺服器回應錯誤: ${response.status}`);
                }

                const data = await response.json();
                renderResult(data);
                showMessage('查詢成功', 'success');

            } catch (error) {
                console.error('Fetch error:', error);
                showMessage('查詢失敗：' + error.message, 'error');
            } finally {
                setLoading(false);
            }
        }

        function renderResult(data) {
            // 清空舊內容
            resultBody.innerHTML = '';

            // 如果回傳的是單一物件，轉成陣列處理；如果是陣列則直接遍歷
            const items = Array.isArray(data) ? data : [data];

            if (items.length === 0 || !items[0]["訂單編號"]) {
                showMessage('找不到相關訂單資料', 'warning');
                return;
            }

            items.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-blue-50 transition-colors';
                
                // 格式化金額
                const formattedPrice = new Intl.NumberFormat('zh-TW', { 
                    style: 'currency', 
                    currency: 'TWD',
                    maximumFractionDigits: 0 
                }).format(item["購買金額"]);

                row.innerHTML = `
                    <td class="px-6 py-4 text-sm font-medium text-blue-600">${item["訂單編號"] || '無'}</td>
                    <td class="px-6 py-4 text-sm text-gray-700">${item["會員姓名"] || '無'}</td>
                    <td class="px-6 py-4 text-sm text-gray-700">${item["購買商品"] || '無'}</td>
                    <td class="px-6 py-4 text-sm text-gray-700 font-bold">${formattedPrice}</td>
                    <td class="px-6 py-4 text-sm text-gray-500">${item["交易時間"] || '無'}</td>
                `;
                resultBody.appendChild(row);
            });

            resultContainer.classList.remove('hidden');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                searchBtn.disabled = true;
                btnText.textContent = '處理中...';
                loadingIcon.classList.remove('hidden');
                searchBtn.classList.replace('bg-blue-600', 'bg-blue-400');
            } else {
                searchBtn.disabled = false;
                btnText.textContent = '送出查詢';
                loadingIcon.classList.add('hidden');
                searchBtn.classList.replace('bg-blue-400', 'bg-blue-600');
            }
        }

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700', 'bg-yellow-100', 'text-yellow-700');
            
            if (type === 'error') {
                messageBox.classList.add('bg-red-100', 'text-red-700');
            } else if (type === 'success') {
                messageBox.classList.add('bg-green-100', 'text-green-700');
                // 成功訊息自動消失
                setTimeout(hideMessage, 3000);
            } else {
                messageBox.classList.add('bg-yellow-100', 'text-yellow-700');
            }
        }

        function hideMessage() {
            messageBox.classList.add('hidden');
        }

        function hideResult() {
            resultContainer.classList.add('hidden');
        }

        // 綁定事件
        searchBtn.addEventListener('click', performSearch);
        userNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
